# ============================================================
# ms-notificacoes ? application.properties
# Porta: 8084
# ============================================================

quarkus.application.name=ms-notificacoes
quarkus.http.port=8084

# ------------------------------------------------------------
# Kafka ? consumers de todos os tópicos de evento
# ------------------------------------------------------------
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# order.created
mp.messaging.incoming.order-created-in.connector=smallrye-kafka
mp.messaging.incoming.order-created-in.topic=order.created
mp.messaging.incoming.order-created-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-created-in.auto.offset.reset=earliest
mp.messaging.incoming.order-created-in.group.id=ms-notificacoes-order-created

# order.status.updated
mp.messaging.incoming.order-status-in.connector=smallrye-kafka
mp.messaging.incoming.order-status-in.topic=order.status.updated
mp.messaging.incoming.order-status-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-status-in.auto.offset.reset=earliest
mp.messaging.incoming.order-status-in.group.id=ms-notificacoes-order-status

# payment.approved
mp.messaging.incoming.payment-approved-in.connector=smallrye-kafka
mp.messaging.incoming.payment-approved-in.topic=payment.approved
mp.messaging.incoming.payment-approved-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-approved-in.auto.offset.reset=earliest
mp.messaging.incoming.payment-approved-in.group.id=ms-notificacoes-payment-approved

# payment.failed
mp.messaging.incoming.payment-failed-in.connector=smallrye-kafka
mp.messaging.incoming.payment-failed-in.topic=payment.failed
mp.messaging.incoming.payment-failed-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-failed-in.auto.offset.reset=earliest
mp.messaging.incoming.payment-failed-in.group.id=ms-notificacoes-payment-failed

# ------------------------------------------------------------
# OpenAPI / Swagger
# ------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Florinda Eats ? Notificaçőes API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ------------------------------------------------------------
# OpenTelemetry
# ------------------------------------------------------------
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=ms-notificacoes,service.version=1.0.0

# ------------------------------------------------------------
# Health / Metrics
# ------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ------------------------------------------------------------
# Logs
# ------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.florinda".level=DEBUG

# ============================================================
# PROFILE: dev
# ============================================================
# Dev Services ? desabilitado para usar o Kafka do Docker manual (florinda-kafka:9092)
# ATENCAO: nao colocar =true aqui; Quarkus sobrescreveria kafka.bootstrap.servers
%dev.quarkus.devservices.enabled=false
%dev.quarkus.swagger-ui.always-include=true
# OTel desabilitado em dev (sem Jaeger local) ? evita retries desnecessarios no startup
%dev.quarkus.otel.sdk.disabled=true

# ============================================================
# PROFILE: test
# ============================================================
%test.mp.messaging.incoming.order-created-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.order-status-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.payment-approved-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.payment-failed-in.connector=smallrye-in-memory
%test.quarkus.log.level=WARN
