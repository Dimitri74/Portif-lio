# Mock do LLM e embedding nos testes — sem Ollama real
quarkus.langchain4j.ollama.chat-model.model-id=test
quarkus.langchain4j.ollama.embedding-model.model-id=test

# Dev Services PostgreSQL
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true

# Redis dev services
quarkus.redis.devservices.enabled=true

# Kafka in-memory
%test.mp.messaging.incoming.catalog-updated-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.order-status-ia-in.connector=smallrye-in-memory

quarkus.log.level=WARN
