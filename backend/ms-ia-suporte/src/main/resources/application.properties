# ============================================================
# ms-ia-suporte — application.properties
# Porta: 8083
# Stack: LangChain4j 0.26.1 + Ollama + PgVector + Redis
# ============================================================

# Logging em arquivo para capturar exceções de runtime
quarkus.log.file.enable=true
quarkus.log.file.path=../.dev-logs/ms-ia-suporte-runtime.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

quarkus.application.name=ms-ia-suporte
quarkus.http.port=8083

# ------------------------------------------------------------
# PostgreSQL + PgVector — base de conhecimento RAG
# Nota: porta 5433 (container pgvector separado do catalogo)
# ------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:florinda}
quarkus.datasource.password=${DB_PASSWORD:florinda123}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/ia_suporte_db}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ------------------------------------------------------------
# Flyway
# ------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# LangChain4j — Ollama (LLM)
# Timeout ISO-8601 (PT = Period of Time): llama3.2 pode ser lento em cold start
# max-retries=0 evita 3x10s = 30s de espera desnecessária
# ------------------------------------------------------------
quarkus.langchain4j.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
quarkus.langchain4j.ollama.timeout=PT180S
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
quarkus.langchain4j.ollama.chat-model.temperature=0.3
quarkus.langchain4j.ollama.chat-model.timeout=PT180S
quarkus.langchain4j.ollama.chat-model.max-retries=0
quarkus.langchain4j.ollama.log-requests=false
quarkus.langchain4j.ollama.log-responses=false

# ------------------------------------------------------------
# LangChain4j — Ollama Embeddings (nomic-embed-text)
# ------------------------------------------------------------
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text
quarkus.langchain4j.ollama.embedding-model.timeout=PT90S

# ------------------------------------------------------------
# LangChain4j — PgVector (RAG embedding store)
# dimensão 768 = nomic-embed-text
# ------------------------------------------------------------
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.table=knowledge_embeddings
quarkus.langchain4j.pgvector.max-results=5
quarkus.langchain4j.pgvector.min-score=0.75

# ------------------------------------------------------------
# Redis — memória de sessão do agente
# ------------------------------------------------------------
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=2s

# ------------------------------------------------------------
# Kafka — consumer de catalog.item.updated
# ------------------------------------------------------------
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

mp.messaging.incoming.catalog-updated-in.connector=smallrye-kafka
mp.messaging.incoming.catalog-updated-in.topic=catalog.item.updated
mp.messaging.incoming.catalog-updated-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.catalog-updated-in.auto.offset.reset=earliest
mp.messaging.incoming.catalog-updated-in.group.id=ms-ia-suporte-catalog

mp.messaging.incoming.order-status-ia-in.connector=smallrye-kafka
mp.messaging.incoming.order-status-ia-in.topic=order.status.updated
mp.messaging.incoming.order-status-ia-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-status-ia-in.auto.offset.reset=earliest
mp.messaging.incoming.order-status-ia-in.group.id=ms-ia-suporte-order-status

# ------------------------------------------------------------
# REST Client — ms-pedidos e ms-catalogo
# ------------------------------------------------------------
quarkus.rest-client.pedidos-api.url=${PEDIDOS_URL:http://localhost:8080}
quarkus.rest-client.pedidos-api.connect-timeout=3000
quarkus.rest-client.pedidos-api.read-timeout=5000

quarkus.rest-client.catalogo-api.url=${CATALOGO_URL:http://localhost:8082}
quarkus.rest-client.catalogo-api.connect-timeout=3000
quarkus.rest-client.catalogo-api.read-timeout=5000

# ------------------------------------------------------------
# MCP Server — endereço do mcp-florinda-server
# ------------------------------------------------------------
florinda.mcp.server.url=${MCP_URL:http://localhost:8085}

# ------------------------------------------------------------
# Guardrails — limites de segurança
# ------------------------------------------------------------
florinda.ia.guardrail.max-input-length=2000
florinda.ia.guardrail.max-output-length=1000
florinda.ia.guardrail.blocked-patterns=ignore previous,forget instructions,jailbreak,act as,you are now

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Florinda Eats — IA Suporte API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=ms-ia-suporte,service.version=1.0.0

# Health / Metrics
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# Logs
quarkus.log.level=INFO
quarkus.log.category."br.com.florinda".level=DEBUG
quarkus.log.category."dev.langchain4j".level=WARN

# ============================================================
# PROFILE: dev
# ============================================================
%dev.quarkus.langchain4j.ollama.log-requests=true
%dev.quarkus.langchain4j.ollama.log-responses=true
%dev.quarkus.swagger-ui.always-include=true
# Dev Services ? desabilitado para usar os containers Docker manuais
%dev.quarkus.devservices.enabled=false
# OTel em dev fica habilitado por padrao para integracao com Jaeger Docker local.
# Se quiser um startup totalmente silencioso sem observabilidade, exporte OTEL_SDK_DISABLED=true.
%dev.quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}

# ============================================================
# PROFILE: test
# ============================================================
%test.quarkus.flyway.clean-at-start=true
%test.mp.messaging.incoming.catalog-updated-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.order-status-ia-in.connector=smallrye-in-memory
%test.quarkus.log.level=WARN
