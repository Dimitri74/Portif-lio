# ============================================================
# CI Pipeline — Florinda Eats 2.0
# Trigger: push e PR em main e develop
# Jobs: build → testes unitários → testes integração → qualidade
# ============================================================

name: CI — Build e Testes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

jobs:

  # ----------------------------------------------------------
  # Job 1: Build e testes unitários (todos os módulos)
  # ----------------------------------------------------------
  build-and-unit-tests:
    name: Build e Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build monorepo + testes unitários
        run: mvn clean verify -DskipITs --batch-mode --no-transfer-progress

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

  # ----------------------------------------------------------
  # Job 2: Testes de integração com Testcontainers
  # ----------------------------------------------------------
  integration-tests:
    name: Testes de Integração (Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Testes de integração — ms-catalogo
        run: |
          cd ms-catalogo
          mvn verify -Dtest=RestauranteIntegrationTest --batch-mode --no-transfer-progress

      - name: Testes de integração — ms-pedidos
        run: |
          cd ms-pedidos
          mvn verify -Dtest=PedidoIntegrationTest --batch-mode --no-transfer-progress

      - name: Testes de integração — ms-pagamentos
        run: |
          cd ms-pagamentos
          mvn verify -Dtest=PagamentoIntegrationTest --batch-mode --no-transfer-progress

      - name: Upload relatório de integração
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-reports
          path: "**/target/failsafe-reports/*.xml"
          retention-days: 7

  # ----------------------------------------------------------
  # Job 3: Análise de qualidade de código
  # ----------------------------------------------------------
  code-quality:
    name: Qualidade de Código
    runs-on: ubuntu-latest
    needs: build-and-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verificar estilo de código (Checkstyle)
        run: mvn checkstyle:check --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: Análise estática (SpotBugs)
        run: mvn spotbugs:check --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: Cobertura de testes (JaCoCo)
        run: mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: "**/target/site/jacoco/"
          retention-days: 7
