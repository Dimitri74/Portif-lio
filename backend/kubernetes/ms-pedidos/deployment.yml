# ============================================================
# ms-pedidos — Deployment K8s (JVM mode)
# 2 réplicas — core do negócio
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pedidos
  namespace: florinda-app
  labels:
    app: ms-pedidos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-pedidos
  template:
    metadata:
      labels:
        app: ms-pedidos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/q/metrics"
        prometheus.io/port:   "8080"
    spec:
      containers:
        - name: ms-pedidos
          image: florinda/ms-pedidos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: florinda-config
            - secretRef:
                name: florinda-secrets
          env:
            - name: DB_JDBC_URL
              value: "jdbc:mysql://mysql-pedidos.florinda-infra.svc.cluster.local:3306/pedidos_db"
          resources:
            requests:
              memory: "192Mi"
              cpu:    "150m"
            limits:
              memory: "384Mi"
              cpu:    "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-pedidos
  namespace: florinda-app
spec:
  selector:
    app: ms-pedidos
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
