# ============================================================
# ms-pagamentos — Deployment K8s
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pagamentos
  namespace: florinda-app
  labels:
    app: ms-pagamentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-pagamentos
  template:
    metadata:
      labels:
        app: ms-pagamentos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/q/metrics"
        prometheus.io/port:   "8081"
    spec:
      containers:
        - name: ms-pagamentos
          image: florinda/ms-pagamentos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: florinda-config
            - secretRef:
                name: florinda-secrets
          env:
            - name: DB_JDBC_URL
              value: "jdbc:mysql://mysql-pagamentos.florinda-infra.svc.cluster.local:3306/pagamentos_db"
          resources:
            requests:
              memory: "192Mi"
              cpu:    "150m"
            limits:
              memory: "384Mi"
              cpu:    "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-pagamentos
  namespace: florinda-app
spec:
  selector:
    app: ms-pagamentos
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

