# ============================================================
# ms-ia-suporte — Deployment K8s
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-ia-suporte
  namespace: florinda-app
  labels:
    app: ms-ia-suporte
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-ia-suporte
  template:
    metadata:
      labels:
        app: ms-ia-suporte
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/q/metrics"
        prometheus.io/port:   "8083"
    spec:
      containers:
        - name: ms-ia-suporte
          image: florinda/ms-ia-suporte:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: florinda-config
            - secretRef:
                name: florinda-secrets
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres.florinda-infra.svc.cluster.local:5432/ia_suporte_db"
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: florinda-config
                  key: OLLAMA_URL
          resources:
            requests:
              memory: "512Mi"
              cpu:    "250m"
            limits:
              memory: "1Gi"
              cpu:    "1000m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ms-ia-suporte
  namespace: florinda-app
spec:
  selector:
    app: ms-ia-suporte
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

