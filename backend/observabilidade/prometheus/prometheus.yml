# ============================================================
# Prometheus — Florinda Eats 2.0
# Scrape de todos os microsserviços via /q/metrics (Micrometer)
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: florinda-eats
    env:     local

# ------------------------------------------------------------
# Regras de alertas (Fase 4)
# ------------------------------------------------------------
rule_files:
  - /etc/prometheus/rules/*.yml

# ------------------------------------------------------------
# Scrape configs — um job por microsserviço
# host.docker.internal = localhost do host dentro do Docker
# ------------------------------------------------------------
scrape_configs:

  - job_name: ms-catalogo
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: ms-catalogo
    metrics_path: /q/metrics
    scrape_interval: 10s

  - job_name: ms-pedidos
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: ms-pedidos
    metrics_path: /q/metrics
    scrape_interval: 10s

  - job_name: ms-pagamentos
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: ms-pagamentos
    metrics_path: /q/metrics
    scrape_interval: 10s

  - job_name: ms-notificacoes
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels:
          service: ms-notificacoes
    metrics_path: /q/metrics
    scrape_interval: 15s

  - job_name: ms-ia-suporte
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          service: ms-ia-suporte
    metrics_path: /q/metrics
    scrape_interval: 15s

  - job_name: mcp-florinda-server
    static_configs:
      - targets: ["host.docker.internal:8085"]
        labels:
          service: mcp-florinda-server
    metrics_path: /q/metrics
    scrape_interval: 15s

  # Kafka JMX exporter (opcional — descomentar se configurado)
  # - job_name: kafka
  #   static_configs:
  #     - targets: ["kafka:9101"]
  #   metrics_path: /metrics
