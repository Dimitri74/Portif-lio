# ============================================================
# ms-pedidos — application.properties
# Porta: 8080
# ============================================================

quarkus.application.name=ms-pedidos
quarkus.http.port=8080

# ------------------------------------------------------------
# MySQL Reactive
# ------------------------------------------------------------
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:florinda}
quarkus.datasource.password=${DB_PASSWORD:florinda123}
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:mysql://localhost:3307/pedidos_db}

# JDBC apenas para o Flyway (migrações não funcionam com driver reativo)
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:mysql://localhost:3307/pedidos_db}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ------------------------------------------------------------
# Flyway
# ------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# Kafka — producer de eventos de pedido
# ------------------------------------------------------------
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

mp.messaging.outgoing.order-out.connector=smallrye-kafka
mp.messaging.outgoing.order-out.topic=order.created
mp.messaging.outgoing.order-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.order-status-out.connector=smallrye-kafka
mp.messaging.outgoing.order-status-out.topic=order.status.updated
mp.messaging.outgoing.order-status-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer — escuta payment.approved e payment.failed
mp.messaging.incoming.payment-in.connector=smallrye-kafka
mp.messaging.incoming.payment-in.topic=payment.approved
mp.messaging.incoming.payment-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-in.auto.offset.reset=earliest
mp.messaging.incoming.payment-in.group.id=ms-pedidos-payment-group

mp.messaging.incoming.payment-failed-in.connector=smallrye-kafka
mp.messaging.incoming.payment-failed-in.topic=payment.failed
mp.messaging.incoming.payment-failed-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-failed-in.auto.offset.reset=earliest
mp.messaging.incoming.payment-failed-in.group.id=ms-pedidos-payment-failed-group

# ------------------------------------------------------------
# REST Client — ms-catalogo (valida restaurante aberto)
# ------------------------------------------------------------
quarkus.rest-client.catalogo-api.url=${CATALOGO_URL:http://localhost:8082}
quarkus.rest-client.catalogo-api.connect-timeout=3000
quarkus.rest-client.catalogo-api.read-timeout=3000

# ------------------------------------------------------------
# OpenAPI / Swagger
# ------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Florinda Eats — Pedidos API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ------------------------------------------------------------
# OpenTelemetry
# ------------------------------------------------------------
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=ms-pedidos,service.version=1.0.0

# ------------------------------------------------------------
# Health / Metrics
# ------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ------------------------------------------------------------
# Kubernetes
# ------------------------------------------------------------
quarkus.kubernetes.namespace=florinda-app
quarkus.kubernetes.replicas=2
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.liveness-probe.http-action-path=/q/health/live
quarkus.kubernetes.readiness-probe.http-action-path=/q/health/ready
quarkus.kubernetes.resources.requests.memory=192Mi
quarkus.kubernetes.resources.requests.cpu=150m
quarkus.kubernetes.resources.limits.memory=384Mi
quarkus.kubernetes.resources.limits.cpu=500m

# Container image
quarkus.container-image.group=florinda
quarkus.container-image.name=ms-pedidos
quarkus.container-image.tag=latest

# ------------------------------------------------------------
# Logs
# ------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.florinda".level=DEBUG

# ============================================================
# PROFILE: dev
# ============================================================
%dev.quarkus.hibernate-orm.log.sql=true
# Dev Services — desabilitado para usar o MySQL do Docker manual (evita conflito de portas)
%dev.quarkus.devservices.enabled=false
%dev.quarkus.swagger-ui.always-include=true

# ============================================================
# PROFILE: test
# ============================================================
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.log.level=WARN
%test.quarkus.log.category."br.com.florinda".level=INFO
%test.kafka.bootstrap.servers=localhost:9092
