# Dev Services — sobe MySQL e Kafka automaticamente via Testcontainers
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=mysql:8.4
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true

# Mock do Kafka nos testes (sem broker real)
mp.messaging.outgoing.order-out.connector=smallrye-in-memory
mp.messaging.outgoing.order-status-out.connector=smallrye-in-memory
mp.messaging.incoming.payment-in.connector=smallrye-in-memory
mp.messaging.incoming.payment-failed-in.connector=smallrye-in-memory

# Mock do REST Client do catalogo
quarkus.rest-client.catalogo-api.url=http://localhost:8082
%test.quarkus.rest-client.catalogo-api.scope=jakarta.inject.Singleton

quarkus.log.level=WARN
quarkus.log.category."br.com.florinda".level=INFO
