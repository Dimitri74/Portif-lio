# ============================================================
# ms-pagamentos ? application.properties
# Porta: 8081
# Stack: imperativo, JDBC MySQL, Kafka Consumer/Producer
# ============================================================

quarkus.application.name=ms-pagamentos
quarkus.http.port=8081

# ------------------------------------------------------------
# MySQL ? JDBC apenas (imperativo, sem reactive)
# ------------------------------------------------------------
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:florinda}
quarkus.datasource.password=${DB_PASSWORD:florinda123}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:mysql://localhost:3308/pagamentos_db}
quarkus.datasource.jdbc.max-size=16

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ------------------------------------------------------------
# Flyway
# ------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# Kafka
# ------------------------------------------------------------
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# Consumer ? escuta order.created (ms-pedidos)
mp.messaging.incoming.order-in.connector=smallrye-kafka
mp.messaging.incoming.order-in.topic=order.created
mp.messaging.incoming.order-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-in.auto.offset.reset=earliest
mp.messaging.incoming.order-in.group.id=ms-pagamentos-order-group

# Producer ? publica payment.approved
mp.messaging.outgoing.payment-approved-out.connector=smallrye-kafka
mp.messaging.outgoing.payment-approved-out.topic=payment.approved
mp.messaging.outgoing.payment-approved-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Producer ? publica payment.failed
mp.messaging.outgoing.payment-failed-out.connector=smallrye-kafka
mp.messaging.outgoing.payment-failed-out.topic=payment.failed
mp.messaging.outgoing.payment-failed-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# ------------------------------------------------------------
# OpenAPI / Swagger
# ------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Florinda Eats ? Pagamentos API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Processamento de pagamentos com idempotęncia
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ------------------------------------------------------------
# OpenTelemetry
# ------------------------------------------------------------
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=ms-pagamentos,service.version=1.0.0

# ------------------------------------------------------------
# Health / Metrics
# ------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ------------------------------------------------------------
# Kubernetes
# ------------------------------------------------------------
quarkus.kubernetes.namespace=florinda-app
quarkus.kubernetes.replicas=2
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.liveness-probe.http-action-path=/q/health/live
quarkus.kubernetes.readiness-probe.http-action-path=/q/health/ready
quarkus.kubernetes.resources.requests.memory=192Mi
quarkus.kubernetes.resources.requests.cpu=150m
quarkus.kubernetes.resources.limits.memory=384Mi
quarkus.kubernetes.resources.limits.cpu=500m

quarkus.container-image.group=florinda
quarkus.container-image.name=ms-pagamentos
quarkus.container-image.tag=latest

# ------------------------------------------------------------
# Logs
# ------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.florinda".level=DEBUG

# ============================================================
# PROFILE: dev
# ============================================================
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.devservices.enabled=false
%dev.quarkus.swagger-ui.always-include=true

# ============================================================
# PROFILE: test
# ============================================================
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.log.level=WARN
%test.quarkus.log.category."br.com.florinda".level=INFO
