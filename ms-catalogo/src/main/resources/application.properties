# ============================================================
# ms-catalogo ? application.properties
# Porta: 8082
# ============================================================

quarkus.application.name=ms-catalogo
quarkus.http.port=8082

# ------------------------------------------------------------
# PostgreSQL + Hibernate ORM Panache
# ------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:florinda}
quarkus.datasource.password=${DB_PASSWORD:florinda123}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/catalogo_db}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ------------------------------------------------------------
# Flyway ? migraçőes de schema
# ------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# Redis ? cache de restaurantes
# ------------------------------------------------------------
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=2s

# ------------------------------------------------------------
# OpenAPI / Swagger UI
# ------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Florinda Eats ? Catálogo API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=CRUD de restaurantes, menus e itens do cardápio
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ------------------------------------------------------------
# OpenTelemetry ? tracing para Jaeger
# ------------------------------------------------------------
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=ms-catalogo,service.version=1.0.0

# ------------------------------------------------------------
# Health checks ? /q/health (Liveness + Readiness para K8s)
# ------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health

# ------------------------------------------------------------
# Prometheus ? /q/metrics
# ------------------------------------------------------------
quarkus.micrometer.export.prometheus.path=/q/metrics

# ------------------------------------------------------------
# Kubernetes ? geraçăo automática de manifests
# ------------------------------------------------------------
quarkus.kubernetes.namespace=florinda-app
quarkus.kubernetes.replicas=1
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.liveness-probe.http-action-path=/q/health/live
quarkus.kubernetes.readiness-probe.http-action-path=/q/health/ready
quarkus.kubernetes.resources.requests.memory=128Mi
quarkus.kubernetes.resources.requests.cpu=100m
quarkus.kubernetes.resources.limits.memory=256Mi
quarkus.kubernetes.resources.limits.cpu=500m

# Container image (Jib)
quarkus.container-image.group=florinda
quarkus.container-image.name=ms-catalogo
quarkus.container-image.tag=latest

# ------------------------------------------------------------
# Logs
# ------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.florinda".level=DEBUG

# ============================================================
# PROFILE: dev
# ============================================================
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.category."br.com.florinda".level=DEBUG
%dev.quarkus.swagger-ui.always-include=true

# Dev Services ? desabilitado para usar o PostgreSQL do Docker manual
%dev.quarkus.devservices.enabled=false
# OTel em dev fica habilitado por padrao para integracao com Jaeger Docker local.
# Se quiser um startup totalmente silencioso sem observabilidade, exporte OTEL_SDK_DISABLED=true.
%dev.quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}

# ============================================================
# PROFILE: test
# ============================================================
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.hibernate-orm.log.sql=false
%test.quarkus.log.level=WARN
%test.quarkus.log.category."br.com.florinda".level=INFO
